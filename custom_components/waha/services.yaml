send_message:
  name: Send WhatsApp Message
  description: Send a WhatsApp message via WAHA
  fields:
    phone_number:
      name: Phone Number
      description: Phone number in international format (e.g., +972541234567) or select from configured numbers
      required: true
      selector:
        text:
          type: tel
    message:
      name: Message
      description: Message text to send
      required: true
      selector:
        text:
          multiline: true

start_typing:
  name: Start Typing Indicator
  description: Send a typing indicator to a WhatsApp chat
  fields:
    phone_number:
      name: Phone Number
      description: Phone number in international format (e.g., +972541234567)
      required: true
      selector:
        text:
          type: tel

stop_typing:
  name: Stop Typing Indicator
  description: Stop sending a typing indicator to a WhatsApp chat
  fields:
    phone_number:
      name: Phone Number
      description: Phone number in international format (e.g., +972541234567)
      required: true
      selector:
        text:
          type: tel

send_location:
  name: Send WhatsApp Location
  description: Send a location message via WAHA
  fields:
    phone_number:
      name: Phone Number
      description: Phone number in international format (e.g., +972541234567) or select from configured numbers
      required: true
      selector:
        text:
          type: tel
    latitude:
      name: Latitude
      description: Latitude of the location (e.g., 52.3676)
      required: true
      selector:
        number:
          min: -90
          max: 90
          step: 0.000001
          mode: box
    longitude:
      name: Longitude
      description: Longitude of the location (e.g., 4.9041)
      required: true
      selector:
        number:
          min: -180
          max: 180
          step: 0.000001
          mode: box
    title:
      name: Title
      description: Name or description of the location (e.g., "Our office")
      required: true
      selector:
        text: 